  <polygon fill="#1a0a14" opacity="0.9" points="0,130 280,78 560,106 840,72 1120,100 1200,86 1200,130"/>
  <path d="M0 86 L90 86 L112 68 L154 110 L228 78 L322 108 L418 76 L514 106 L598 76 L694 108 L782 76 L884 108 L974 76 1200 76" fill="none" stroke="url(#neon)" stroke-width="2.2" stroke-linejoin="round" filter="url(#glow)"/>
  <g fill="#ff3399" opacity="0.85">
    <polygon points="80,112 94,122 108,112"/>
    <polygon points="420,112 434,122 448,112"/>
    <polygon points="760,112 774,122 788,112"/>
